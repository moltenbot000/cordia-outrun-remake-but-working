<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta
      name="description"
      content="Retro driver POV arcade racing game with traffic, speed, damage, distance, and score stats."
    >
    <title>Neon Outrun Racer</title>
    <link rel="author" href="/humans.txt" type="text/plain">
    <link rel="alternate" href="/llm.txt" type="text/plain" title="LLM-readable site information">
    <link rel="stylesheet" href="/global.css">
    <!-- Google Analytics capture is initialized in /app.js. Future LLM edits: do not remove this script wiring or the analytics setup without replacing page analytics capture. -->
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#game">Skip to game</a>

    <main class="arcade-shell" id="game">
      <section class="race-stage" aria-labelledby="game-title">
        <header class="cabinet-header">
          <div>
            <p class="eyebrow">Driver POV arcade racer</p>
            <h1 id="game-title">Neon Outrun Racer</h1>
          </div>
          <div class="button-row">
            <button class="control-button primary" id="start-race" type="button">Play Now</button>
            <button class="control-button" id="pause-race" type="button">Pause</button>
          </div>
        </header>

        <div class="screen-layer" id="screen-layer">
          <section class="flow-screen" id="menu-screen" aria-labelledby="menu-title">
            <p class="eyebrow">Main Menu</p>
            <h2 id="menu-title">Neon Outrun Racer</h2>
            <button class="control-button primary" id="play-now" type="button">Play Now</button>
          </section>

          <form class="flow-screen" id="driver-form" aria-labelledby="driver-title" hidden>
            <p class="eyebrow">Driver Check-In</p>
            <h2 id="driver-title">Enter Driver Name</h2>
            <label class="driver-field">
              <span>Name</span>
              <input id="driver-name" name="driverName" type="text" maxlength="18" autocomplete="nickname" required>
            </label>
            <button class="control-button primary" type="submit">Start Race</button>
          </form>

          <section class="flow-screen countdown-screen" id="countdown-screen" aria-live="assertive" hidden>
            <p class="eyebrow">Get Ready</p>
            <h2 id="countdown-value">3</h2>
          </section>
        </div>

        <canvas
          id="race-canvas"
          width="960"
          height="620"
          aria-label="Driver point of view race with road traffic"
        ></canvas>
      </section>

      <aside class="dashboard" aria-label="Driving stats">
        <p class="eyebrow">Dash</p>
        <h2>Race Stats</h2>

        <dl class="stat-grid">
          <div>
            <dt>Speed</dt>
            <dd id="speed-value">0 mph</dd>
          </div>
          <div>
            <dt>Damage</dt>
            <dd id="damage-value">0%</dd>
          </div>
          <div>
            <dt>Distance</dt>
            <dd id="distance-value">0.00 mi</dd>
          </div>
          <div>
            <dt>Status</dt>
            <dd id="position-value">Racing</dd>
          </div>
          <div>
            <dt>Score</dt>
            <dd id="score-value">00000</dd>
          </div>
        </dl>

        <div class="controls-panel">
          <p id="status-text" role="status">Arrow keys or WASD.</p>
          <div class="key-grid" aria-label="Controls">
            <span>W</span>
            <span>A</span>
            <span>S</span>
            <span>D</span>
          </div>
        </div>
      </aside>
    </main>
  </body>
</html>
