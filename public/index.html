<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="description" content="A fast browser racing game with a name entry and countdown start.">
    <title>Nitro Rush</title>
    <link rel="author" href="/humans.txt" type="text/plain">
    <link rel="alternate" href="/llm.txt" type="text/plain" title="LLM-readable site information">
    <link rel="stylesheet" href="/global.css">
    <!-- Google Analytics capture is initialized in /app.js. Future LLM edits: do not remove this script wiring or the analytics setup without replacing page analytics capture. -->
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Street sprint</p>
          <h1>Nitro Rush</h1>
        </div>
      </header>

      <main id="main" class="race-app" aria-live="polite">
        <section class="screen menu-screen" id="menu-screen" data-screen="menu" aria-labelledby="menu-title">
          <div class="screen-copy">
            <p class="eyebrow">Ready line</p>
            <h2 id="menu-title">Midnight drag race.</h2>
            <p>Launch from the start line, catch the green, and tear down the strip.</p>
            <button class="button primary" id="play-now" type="button">Play now</button>
          </div>
          <div class="track-preview" aria-hidden="true">
            <span class="track-lane"></span>
            <span class="track-lane"></span>
            <span class="track-lane"></span>
            <span class="preview-car"></span>
          </div>
        </section>

        <section class="screen name-screen" id="name-screen" data-screen="name" aria-labelledby="name-title" hidden>
          <div class="screen-copy narrow">
            <p class="eyebrow">Driver check</p>
            <h2 id="name-title">Enter racer name.</h2>
            <form class="name-form" id="name-form">
              <label for="player-name">Racer name</label>
              <div class="input-row">
                <input
                  id="player-name"
                  name="player-name"
                  type="text"
                  autocomplete="nickname"
                  maxlength="24"
                  placeholder="Speedster"
                >
                <button class="button primary" type="submit">Start</button>
              </div>
              <p class="form-error" id="name-error" role="alert"></p>
            </form>
          </div>
        </section>

        <section
          class="screen countdown-screen"
          id="countdown-screen"
          data-screen="countdown"
          aria-labelledby="countdown-title"
          hidden
        >
          <div class="countdown-panel">
            <p class="eyebrow" id="countdown-title">Race starts in</p>
            <strong id="countdown-number">3</strong>
          </div>
        </section>

        <section class="screen race-screen" id="race-screen" data-screen="race" aria-labelledby="race-title" hidden>
          <div class="race-header">
            <div>
              <p class="eyebrow">Race live</p>
              <h2 id="race-title"><span id="racer-name"></span> is racing.</h2>
            </div>
            <button class="button secondary" id="restart-race" type="button">Main menu</button>
          </div>
          <div class="race-track" aria-label="Race track">
            <div class="finish-line" aria-hidden="true"></div>
            <div class="lane-markers" aria-hidden="true"></div>
            <div class="car" id="race-car" aria-label="Racing car">
              <span class="car-body"></span>
              <span class="car-cabin"></span>
              <span class="wheel front"></span>
              <span class="wheel rear"></span>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
